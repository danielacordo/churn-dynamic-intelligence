[pytest]
# Most files under tests/ are named after the module they cover (business.py, physics.py, ...)
# rather than pytest's default test_*.py / *_test.py pattern, so a plain `pytest` or
# `pytest tests/` was silently only collecting tests/ab_test.py (the one file that happens to
# match *_test.py) -- 18 of 349 tests. This makes pytest collect any *.py file under tests/.
testpaths = tests
python_files = *.py
